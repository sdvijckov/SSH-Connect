; ==========================================
;  Настройки KiTTY (портативный режим)
;  Этот файл управляет поведением приложения KiTTY
;  Настройки сессии (скролл, окно) хранятся в Sessions/Default%20Settings
; ==========================================

[KiTTY]
; --- Режим сохранения настроек ---
; dir = сохранять сессии в папке Sessions/ (портативный режим)
; registry = сохранять в реестре Windows
savemode=dir

; --- Автоматическое переподключение ---
autoreconnect=yes

; --- Вкладки ---
; Разрешить переключение вкладок через Ctrl+Tab
ctrltab=yes

; --- Прозрачность ---
; Включить поддержку прозрачности окна
transparency=yes

; --- Иконка в трее ---
; Показывать иконку в системном трее
icon=yes

; --- ZModem ---
; Поддержка протокола ZModem для передачи файлов
zmodem=yes

; --- Ссылки ---
; Распознавать гиперссылки в терминале
hyperlink=yes

; --- Скрипты ---
; Включить поддержку скриптов
shortcuts=yes

[ConfigBox]
; --- Окно выбора сессии ---
; Действие при двойном клике: open (открыть) или start (запустить)
dblclick=open

; --- Фильтр сессий ---
; Включить поле фильтрации в списке сессий
filter=yes

; --- Высота списка ---
; Количество видимых строк в списке сессий
height=21

; --- Перезагрузка списка ---
; Обновлять список сессий при каждом открытии
reload=yes

[Shortcuts]
; --- Горячие клавиши KiTTY ---
; Все отключены по умолчанию (закомментированы)
; Для активации уберите точку с запятой и укажите сочетание клавиш
; Пример: ;autocommand=Shift+F12

[Print]
; --- Настройки печати ---
; Размер шрифта при печати
height=100
; Максимум строк на странице
maxline=60
; Максимум символов в строке
maxchar=85